<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Ahoj</title>
</head>
<body>
    <ul id="list">

    </ul>

    <script>
        const evtSource = new EventSource("https://localhost:7194/stream");
        const eventList = document.getElementById("list");

        evtSource.onopen = () => {
            const newElement = document.createElement("li");
            newElement.textContent = "SSE connected";
            eventList.appendChild(newElement);
        };

        evtSource.onerror = () => {
            const newElement = document.createElement("li");
            newElement.textContent = "SSE error";
            eventList.appendChild(newElement);
        };

        evtSource.addEventListener("init", (event) => {
            const newElement = document.createElement("li");
            newElement.textContent = `init: ${event.data}`;
            eventList.appendChild(newElement);
        });

        evtSource.addEventListener("student", (event) => {
            const student = JSON.parse(event.data);

            const newElement = document.createElement("li");
            newElement.textContent = `${student.id}: ${student.name} Active: ${student.isActive}`;
            eventList.appendChild(newElement);
        });
    </script>
</body>
</html>
